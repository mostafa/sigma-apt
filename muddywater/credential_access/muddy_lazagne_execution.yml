title: MuddyWater LaZagne Credential Harvester
id: b2e8f46a-c5d9-4a37-8f1b-7d6e3c9a2b85
status: experimental
description: >
    Detects execution of the LaZagne credential harvesting tool, which
    MuddyWater uses to extract passwords from browsers, email clients,
    databases, WiFi profiles, and LSA secrets. LaZagne is a Python-based
    tool that may run as a compiled executable or via Python interpreter.
author: Mostafa Moradian
date: 2026-03-09
references:
    - https://attack.mitre.org/groups/G0069/
    - https://attack.mitre.org/software/S0349/
    - https://www.symantec.com/blogs/threat-intelligence/seedworm-espionage-group
    - https://researchcenter.paloaltonetworks.com/2017/11/unit42-muddying-the-water-targeted-attacks-in-the-middle-east/
tags:
    - attack.credential_access
    - attack.t1555
    - attack.t1003.004
    - attack.t1003.005
    - attack.t1552.001
    - attack.g0069
logsource:
    category: process_creation
    product: windows
detection:
    selection_binary:
        Image|endswith:
            - '\lazagne.exe'
            - '\LaZagne.exe'
    selection_commandline:
        CommandLine|contains:
            - 'lazagne'
            - 'LaZagne'
    selection_python_lazagne:
        Image|endswith: '\python.exe'
        CommandLine|contains: 'lazagne'
    selection_lazagne_modules:
        CommandLine|contains:
            - 'lazagne all'
            - 'lazagne browsers'
            - 'lazagne mails'
            - 'lazagne wifi'
            - 'lazagne windows'
    condition: 1 of selection_*
falsepositives:
    - Authorized penetration testing using LaZagne
level: critical
