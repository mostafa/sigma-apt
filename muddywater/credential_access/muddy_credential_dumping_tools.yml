title: MuddyWater Credential Dumping Tool Execution
id: a1d7e359-b4c8-4f26-9e3a-6c5f2d8b1a74
status: experimental
description: >
    Detects execution of credential dumping tools commonly deployed by
    MuddyWater: Mimikatz, procdump64 targeting LSASS, and Browser64 for
    stealing browser-stored passwords. The group consistently uses these
    tools across campaigns for credential harvesting.
author: Mostafa
date: 2026-03-09
references:
    - https://attack.mitre.org/groups/G0069/
    - https://researchcenter.paloaltonetworks.com/2017/11/unit42-muddying-the-water-targeted-attacks-in-the-middle-east/
    - https://www.symantec.com/blogs/threat-intelligence/seedworm-espionage-group
    - https://www.trendmicro.com/en_us/research/21/c/earth-vetala---muddywater-continues-to-target-organizations-in-t.html
tags:
    - attack.credential_access
    - attack.t1003.001
    - attack.t1003.004
    - attack.t1555.003
    - attack.g0069
logsource:
    category: process_creation
    product: windows
detection:
    selection_mimikatz:
        CommandLine|contains:
            - 'sekurlsa::logonpasswords'
            - 'sekurlsa::wdigest'
            - 'lsadump::sam'
            - 'lsadump::dcsync'
            - 'privilege::debug'
    selection_mimikatz_binary:
        Image|endswith:
            - '\mimikatz.exe'
            - '\mimi.exe'
            - '\mimi64.exe'
        OriginalFileName: 'mimikatz.exe'
    selection_procdump_lsass:
        Image|endswith:
            - '\procdump.exe'
            - '\procdump64.exe'
        CommandLine|contains: 'lsass'
    selection_browser64:
        Image|endswith: '\Browser64.exe'
    selection_browser64_cmdline:
        CommandLine|contains: 'browser64'
    condition: 1 of selection_*
falsepositives:
    - Legitimate use of procdump for application debugging (not targeting lsass)
    - Security assessments using Mimikatz with authorization
level: critical
